<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title" [innerHTML]="'hero.title' | translate"></h1>
    <p class="hero-subtitle" [innerHTML]="'hero.subtitle' | translate"></p>
    <button class="btn btn-solid hero-btn" type="button" onclick="window.location.href='https://atelier-sepia-three.vercel.app/home'">
      {{ 'hero.cta' | translate }}
    </button>
  </div>
  <div class ="btn-container">
    <button class="btn btn-outline" type="button" onclick="window.location.href='https://atelier-sepia-three.vercel.app/home'">{{ 'header.login' | translate }}</button>
    <button class="btn btn-solid" type="button" onclick="window.location.href='https://atelier-sepia-three.vercel.app/home'">{{ 'header.join' | translate }}</button>
  </div>
  <div class="hero-overlay"></div>
</section>
