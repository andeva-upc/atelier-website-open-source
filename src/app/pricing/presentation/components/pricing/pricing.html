<section class="pricing" id="precios">
  <div class="pricing-container">
    <!-- Header -->
    <div class="pricing-header">
      <span class="pricing-badge">Precios</span>
      <p class="pricing-description">
        Ofrecemos diferentes modelos de subscripción que se adaptan a ti y escalan contigo con beneficios únicos para crecer tu taller.
      </p>
    </div>

    <!-- Toggle -->
    <div class="pricing-toggle-wrapper">
      <div class="pricing-toggle">
        <button 
          class="toggle-btn" 
          [class.active]="!isAnnual()" 
          (click)="togglePricing()">
          Mensual
        </button>
        <button 
          class="toggle-btn" 
          [class.active]="isAnnual()" 
          (click)="togglePricing()">
          Anual <span class="discount-badge">- Ahorra 17%</span>
        </button>
      </div>
    </div>

    <!-- Grid Placeholder -->
    <div class="pricing-grid">
       <!-- Content for Phase 3 -->
    </div>
  </div>
</section>
