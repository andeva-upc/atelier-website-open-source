<section class="team-section">
    <div class="team-container">
        <header class="team-header">
            <h2 class="team-badge">Nuestro Equipo</h2>
            <p class="team-subtitle">Conozca al equipo que está detrás de atelier.</p>
        </header>

        <div class="team-grid">
            @for (member of members; track member.name; let i = $index) {
                <div class="team-card">
                    <div class="card-header">
                        <h3 class="member-name">{{ member.name }}</h3>
                        <span class="member-role">{{ member.role }}</span>
                    </div>
                    <div class="member-image-container">
                        <img [src]="member.imageUrl" [alt]="'Foto de ' + member.name" class="member-image">
                    </div>
                    <div class="card-footer">
                        <p class="member-description">{{ member.description }}</p>
                    </div>
                </div>
            }
        </div>
    </div>
</section>
